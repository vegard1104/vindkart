<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vindkart &#8212; Norsk Vindkart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; }
        #map { width: 100%; height: 100vh; }
        #windCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 450; pointer-events: none; }

        .controls {
            position: absolute; top: 16px; right: 16px; z-index: 1000;
            background: rgba(10, 10, 26, 0.88); backdrop-filter: blur(16px);
            border-radius: 16px; padding: 20px 22px; width: 320px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5); border: 1px solid rgba(126,200,227,0.12);
        }
        .controls h2 { font-size: 20px; font-weight: 700; color: #7ec8e3; margin-bottom: 2px; letter-spacing: -0.3px; }
        .controls .subtitle { font-size: 11px; color: #666; margin-bottom: 14px; }

        .date-scroll { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
        .date-scroll::-webkit-scrollbar { height: 4px; }
        .date-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .date-btn {
            flex-shrink: 0; padding: 6px 10px; border: 1px solid rgba(126,200,227,0.15);
            background: transparent; color: #777; border-radius: 8px; cursor: pointer;
            font-size: 12px; transition: all 0.2s; white-space: nowrap;
        }
        .date-btn:hover { background: rgba(126,200,227,0.08); color: #ccc; }
        .date-btn.active { background: rgba(126,200,227,0.15); color: #7ec8e3; border-color: rgba(126,200,227,0.4); font-weight: 600; }

        .control-group { margin-bottom: 14px; }
        .control-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-group .value { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .control-group .unit { font-size: 12px; color: #7ec8e3; font-weight: 400; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px;
            background: linear-gradient(90deg, #1a1a3e, #2a2a5a); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
            background: #7ec8e3; border: 2px solid #fff; cursor: pointer;
            box-shadow: 0 0 8px rgba(126,200,227,0.4);
        }

        .wind-info {
            background: rgba(126,200,227,0.06); border-radius: 12px; padding: 12px 14px;
            border: 1px solid rgba(126,200,227,0.1);
        }
        .wind-info .row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .wind-info .row:last-child { margin-bottom: 0; }
        .wind-info .label { color: #666; font-size: 12px; }
        .wind-info .val { color: #fff; font-size: 12px; font-weight: 600; }

        .beaufort-bar { margin-top: 10px; background: #151530; border-radius: 4px; height: 6px; overflow: hidden; }
        .beaufort-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease, background 0.4s ease; }
        .beaufort-label { font-size: 10px; color: #555; margin-top: 3px; }

        .speed-gradient {
            margin-top: 10px; height: 6px; border-radius: 3px;
            background: linear-gradient(90deg, #4a9ebe, #2ecc71, #f1c40f, #e67e22, #e74c3c, #8e44ad);
        }
        .speed-labels { display: flex; justify-content: space-between; font-size: 9px; color: #555; margin-top: 2px; }

        .particle-toggle {
            margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888;
        }
        .toggle-switch {
            width: 36px; height: 20px; background: #222; border-radius: 10px; position: relative;
            cursor: pointer; transition: background 0.3s;
        }
        .toggle-switch.on { background: rgba(126,200,227,0.3); }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
            background: #555; border-radius: 50%; transition: all 0.3s;
        }
        .toggle-switch.on::after { left: 18px; background: #7ec8e3; }

        .api-badge { display: inline-block; font-size: 9px; color: #444; padding: 2px 6px; border-radius: 3px; margin-top: 8px; }

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2000; background: rgba(10,10,26,0.97);
            display: flex; align-items: center; justify-content: center;
        }
        .loading-box { text-align: center; color: #7ec8e3; }
        .loading-box .spinner {
            width: 40px; height: 40px; border: 3px solid #151530; border-top-color: #7ec8e3;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-box .error { color: #e74c3c; margin-top: 10px; font-size: 12px; }
        .loading-box .retry-btn {
            margin-top: 12px; padding: 8px 20px; border: 1px solid #7ec8e3; background: transparent;
            color: #7ec8e3; border-radius: 8px; cursor: pointer; font-size: 13px;
        }

        .legend {
            position: absolute; bottom: 20px; left: 16px; z-index: 1000;
            background: rgba(10,10,26,0.88); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 10px 14px; font-size: 11px;
            border: 1px solid rgba(126,200,227,0.08);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; color: #888; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

        .grid-status {
            position: absolute; bottom: 20px; right: 16px; z-index: 1000;
            background: rgba(10,10,26,0.88); backdrop-filter: blur(8px);
            border-radius: 8px; padding: 6px 10px; font-size: 10px; color: #555;
            border: 1px solid rgba(126,200,227,0.08); transition: opacity 0.3s;
        }
        .grid-status.loading { color: #7ec8e3; }

        /* Mobile collapse toggle */
        .controls-toggle {
            display: none; position: absolute; top: 12px; right: 12px; z-index: 1001;
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(10, 10, 26, 0.88); backdrop-filter: blur(16px);
            border: 1px solid rgba(126,200,227,0.15); cursor: pointer;
            align-items: center; justify-content: center; color: #7ec8e3; font-size: 20px;
        }
        .controls-toggle svg { width: 22px; height: 22px; }

        @media (max-width: 600px) {
            .controls-toggle { display: flex; }
            .controls {
                width: calc(100% - 24px); right: 12px; left: 12px; top: 64px;
                padding: 14px 14px; border-radius: 14px;
                max-height: calc(100vh - 80px); overflow-y: auto;
                transition: transform 0.3s ease, opacity 0.3s ease;
            }
            .controls.collapsed {
                transform: translateY(-10px); opacity: 0; pointer-events: none; visibility: hidden;
            }
            .controls h2 { font-size: 17px; }
            .controls .subtitle { font-size: 10px; margin-bottom: 10px; }
            .date-scroll { gap: 5px; margin-bottom: 10px; }
            .date-btn { padding: 8px 11px; font-size: 12px; min-height: 36px; }
            .control-group { margin-bottom: 10px; }
            .control-group .value { font-size: 22px; }
            .control-group label { font-size: 10px; }
            input[type="range"] { height: 6px; }
            input[type="range"]::-webkit-slider-thumb { width: 24px; height: 24px; }
            .wind-info { padding: 10px 12px; }
            .wind-info .label, .wind-info .val { font-size: 12px; }
            .legend {
                bottom: 10px; left: 10px; padding: 7px 10px; font-size: 10px;
                border-radius: 8px; max-width: 160px;
            }
            .legend-dot { width: 6px; height: 6px; }
            .legend-item { gap: 5px; margin-bottom: 2px; }
            .particle-toggle { margin-top: 8px; }
            .speed-labels { font-size: 8px; }
            .api-badge { font-size: 8px; }
            .grid-status { bottom: 10px; right: 10px; font-size: 9px; }
        }

        @media (max-width: 380px) {
            .controls { padding: 12px 10px; }
            .control-group .value { font-size: 20px; }
            .date-btn { padding: 7px 9px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="loading-box">
            <div class="spinner" id="spinner"></div>
            <div id="loadingText">Henter vinddata...</div>
            <div class="error" id="errorText" style="display:none;"></div>
            <button class="retry-btn" id="retryBtn" style="display:none;" onclick="loadData()">Pr&#248;v igjen</button>
        </div>
    </div>

    <div id="map"></div>
    <canvas id="windCanvas"></canvas>

    <button class="controls-toggle" id="controlsToggle" aria-label="Vis/skjul kontroller">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line>
            <line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line>
            <line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line>
            <line x1="17" y1="16" x2="23" y2="16"></line>
        </svg>
    </button>

    <div class="controls">
        <h2>Vindkart</h2>
        <div class="subtitle" id="locationSubtitle">Kartsentrum</div>

        <div class="date-scroll" id="dateRow"></div>

        <div class="control-group">
            <label>Klokkeslett</label>
            <div class="value" id="timeDisplay">12:00</div>
            <input type="range" id="timeSlider" min="0" max="23" value="12" step="1">
        </div>

        <div class="control-group">
            <label>Partikkeltetthet</label>
            <div class="value"><span id="densityDisplay">500</span></div>
            <input type="range" id="densitySlider" min="100" max="2000" value="500" step="50">
        </div>

        <div class="wind-info">
            <div class="row"><span class="label">Vindretning (senter)</span><span class="val" id="wDir">&#8212;</span></div>
            <div class="row"><span class="label">Vindhastighet (senter)</span><span class="val" id="wSpeed">&#8212;</span></div>
            <div class="row"><span class="label">Vindkast (senter)</span><span class="val" id="wGust">&#8212;</span></div>
            <div class="row"><span class="label">Vinden fra</span><span class="val" id="wFrom">&#8212;</span></div>
            <div class="beaufort-bar"><div class="beaufort-fill" id="beaufortFill"></div></div>
            <div class="beaufort-label" id="beaufortLabel"></div>
        </div>

        <div class="speed-gradient"></div>
        <div class="speed-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20+</span></div>

        <div class="particle-toggle">
            <div class="toggle-switch on" id="particleToggle"></div>
            <span>Vindanimasjon</span>
        </div>

        <div class="api-badge">Kilde: Open-Meteo (MET Norway)</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4a9ebe;"></div> Svak vind (&lt;5 m/s)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2ecc71;"></div> Lett bris (5&#8211;8 m/s)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f1c40f;"></div> Frisk bris (8&#8211;14 m/s)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div> Kuling+ (&gt;14 m/s)</div>
    </div>

    <div class="grid-status" id="gridStatus">Vindrutenett: laster...</div>

    <script>
    // === CONFIG ===
    const DEFAULT_LAT = 61.03219;
    const DEFAULT_LNG = 7.30878;
    const FORECAST_DAYS = 7;
    const GRID_SIZE = 6; // 6x6 = 36 grid points

    // === STATE ===
    let dates = [];
    let selectedDate = '';
    let currentHour = 12;
    let particleCount = 500;
    let animationEnabled = true;
    let animFrameId = null;
    let isLoadingGrid = false;
    let fetchDebounceTimer = null;

    // Wind grid: stores wind data for a grid of lat/lng points
    // windGrid[date][hour] = { lats: [], lngs: [], dirs: [][], speeds: [][], gusts: [][] }
    let windGrid = {};
    let gridBounds = null; // { south, north, west, east }
    let gridLats = [];
    let gridLngs = [];

    // === MAP ===
    const map = L.map('map', { zoomControl: true }).setView([DEFAULT_LAT, DEFAULT_LNG], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap | Vind: Open-Meteo',
        maxZoom: 18
    }).addTo(map);

    const centerMarker = L.circleMarker([DEFAULT_LAT, DEFAULT_LNG], {
        radius: 7, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.9, weight: 2
    }).addTo(map).bindPopup('<b>Senterpunkt</b><br>61&#176;01\'55.9"N 7&#176;18\'31.6"E');

    // === CANVAS ===
    const canvas = document.getElementById('windCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // === WIND GRID INTERPOLATION ===
    // Bilinear interpolation to get wind at any lat/lng from the grid
    function getWindAtLatLng(lat, lng, date, hour) {
        const grid = windGrid[date];
        if (!grid || !grid[hour]) return null;
        const data = grid[hour];

        // Find grid cell containing this point
        const latStep = gridLats.length > 1 ? gridLats[1] - gridLats[0] : 1;
        const lngStep = gridLngs.length > 1 ? gridLngs[1] - gridLngs[0] : 1;

        // Fractional grid indices
        const fi = (lat - gridLats[0]) / latStep;
        const fj = (lng - gridLngs[0]) / lngStep;

        // Clamp to grid bounds
        const i0 = Math.max(0, Math.min(gridLats.length - 2, Math.floor(fi)));
        const j0 = Math.max(0, Math.min(gridLngs.length - 2, Math.floor(fj)));
        const i1 = i0 + 1;
        const j1 = j0 + 1;

        // Interpolation weights
        const ti = Math.max(0, Math.min(1, fi - i0));
        const tj = Math.max(0, Math.min(1, fj - j0));

        // Bilinear interpolation for direction (using vector decomposition to handle wrapping)
        const d00 = data.dirs[i0][j0], d01 = data.dirs[i0][j1];
        const d10 = data.dirs[i1][j0], d11 = data.dirs[i1][j1];

        // Convert directions to unit vectors for proper interpolation
        const toRad = d => d * Math.PI / 180;
        const sx00 = Math.sin(toRad(d00)), sy00 = Math.cos(toRad(d00));
        const sx01 = Math.sin(toRad(d01)), sy01 = Math.cos(toRad(d01));
        const sx10 = Math.sin(toRad(d10)), sy10 = Math.cos(toRad(d10));
        const sx11 = Math.sin(toRad(d11)), sy11 = Math.cos(toRad(d11));

        const ix = sx00*(1-ti)*(1-tj) + sx01*(1-ti)*tj + sx10*ti*(1-tj) + sx11*ti*tj;
        const iy = sy00*(1-ti)*(1-tj) + sy01*(1-ti)*tj + sy10*ti*(1-tj) + sy11*ti*tj;
        let dir = Math.atan2(ix, iy) * 180 / Math.PI;
        if (dir < 0) dir += 360;

        // Bilinear interpolation for speed and gust
        const s00 = data.speeds[i0][j0], s01 = data.speeds[i0][j1];
        const s10 = data.speeds[i1][j0], s11 = data.speeds[i1][j1];
        const speed = s00*(1-ti)*(1-tj) + s01*(1-ti)*tj + s10*ti*(1-tj) + s11*ti*tj;

        const g00 = data.gusts[i0][j0], g01 = data.gusts[i0][j1];
        const g10 = data.gusts[i1][j0], g11 = data.gusts[i1][j1];
        const gust = g00*(1-ti)*(1-tj) + g01*(1-ti)*tj + g10*ti*(1-tj) + g11*ti*tj;

        return { dir, speed, gust };
    }

    // Convert screen pixel to lat/lng
    function screenToLatLng(x, y) {
        const point = map.containerPointToLatLng([x, y]);
        return { lat: point.lat, lng: point.lng };
    }

    // === PARTICLE SYSTEM ===
    class WindParticle {
        constructor() { this.reset(true); }

        reset(randomAge = false) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.maxAge = 60 + Math.random() * 80;
            this.age = randomAge ? Math.random() * this.maxAge * 0.5 : 0;
            this.history = [];
            this.lastSpeed = 0;
        }

        update() {
            if (this.age >= this.maxAge) { this.reset(); return; }
            this.age++;

            // Get wind at this particle's geographic position
            const pos = screenToLatLng(this.x, this.y);
            const wind = getWindAtLatLng(pos.lat, pos.lng, selectedDate, currentHour);
            if (!wind) return;

            this.lastSpeed = wind.speed;

            // Wind direction: meteorological (where FROM) -> convert to where it blows TO
            const toRad = (wind.dir + 180) % 360 * Math.PI / 180;
            const speedFactor = Math.max(0.5, wind.speed * 0.35);
            const turbulence = (Math.random() - 0.5) * 0.8;

            const vx = Math.sin(toRad) * speedFactor + turbulence;
            const vy = -Math.cos(toRad) * speedFactor + turbulence;

            this.history.push({ x: this.x, y: this.y });
            if (this.history.length > 14) this.history.shift();

            this.x += vx;
            this.y += vy;

            if (this.x < -10 || this.x > canvas.width + 10 ||
                this.y < -10 || this.y > canvas.height + 10) {
                this.reset();
            }
        }

        draw(ctx) {
            if (this.history.length < 2) return;
            const lifeRatio = 1 - this.age / this.maxAge;
            const baseAlpha = Math.min(1, lifeRatio * 1.2);
            const color = speedColor(this.lastSpeed);
            const totalPts = this.history.length;

            // Draw trail segments with increasing opacity and width
            for (let i = 1; i < totalPts; i++) {
                const segAlpha = baseAlpha * (0.3 + 0.7 * (i / totalPts));
                ctx.beginPath();
                ctx.moveTo(this.history[i-1].x, this.history[i-1].y);
                ctx.lineTo(this.history[i].x, this.history[i].y);
                ctx.strokeStyle = color.replace(')', ',' + segAlpha + ')').replace('rgb', 'rgba');
                ctx.lineWidth = 1 + (i / totalPts) * (1.5 + this.lastSpeed * 0.12);
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            // Leading edge segment
            if (totalPts > 0) {
                const last = this.history[totalPts - 1];
                ctx.beginPath();
                ctx.moveTo(last.x, last.y);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = color.replace(')', ',' + (baseAlpha * 0.9) + ')').replace('rgb', 'rgba');
                ctx.lineWidth = 2 + this.lastSpeed * 0.12;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            // Head dot
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2 + this.lastSpeed * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = color.replace(')', ',' + Math.min(1, baseAlpha * 1.1) + ')').replace('rgb', 'rgba');
            ctx.fill();
        }
    }

    function speedColor(speed) {
        if (speed < 2) return 'rgb(74, 158, 190)';
        if (speed < 5) return 'rgb(100, 200, 220)';
        if (speed < 8) return 'rgb(46, 204, 113)';
        if (speed < 11) return 'rgb(241, 196, 15)';
        if (speed < 14) return 'rgb(230, 126, 34)';
        if (speed < 18) return 'rgb(231, 76, 60)';
        return 'rgb(142, 68, 173)';
    }

    function windColorHex(speed) {
        if (speed < 5) return '#4a9ebe';
        if (speed < 8) return '#2ecc71';
        if (speed < 14) return '#f1c40f';
        if (speed < 20) return '#e74c3c';
        return '#8e44ad';
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new WindParticle());
        }
    }

    function animate() {
        if (!animationEnabled) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }

        if (!windGrid[selectedDate] || !windGrid[selectedDate][currentHour]) {
            animFrameId = requestAnimationFrame(animate);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        while (particles.length < particleCount) particles.push(new WindParticle());
        while (particles.length > particleCount) particles.pop();

        for (const p of particles) {
            p.update();
            p.draw(ctx);
        }

        animFrameId = requestAnimationFrame(animate);
    }

    // === GRID API ===
    function getMapGridBounds() {
        const bounds = map.getBounds();
        const pad = 0.15; // 15% padding so particles near edges still have data
        const latRange = bounds.getNorth() - bounds.getSouth();
        const lngRange = bounds.getEast() - bounds.getWest();
        return {
            south: bounds.getSouth() - latRange * pad,
            north: bounds.getNorth() + latRange * pad,
            west: bounds.getWest() - lngRange * pad,
            east: bounds.getEast() + lngRange * pad
        };
    }

    async function fetchWindGrid() {
        if (isLoadingGrid) return;
        isLoadingGrid = true;

        const statusEl = document.getElementById('gridStatus');
        statusEl.textContent = 'Henter vindrutenett...';
        statusEl.classList.add('loading');

        const b = getMapGridBounds();
        gridBounds = b;

        // Build grid of lat/lng points
        const lats = [];
        const lngs = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            lats.push(b.south + (b.north - b.south) * i / (GRID_SIZE - 1));
            lngs.push(b.west + (b.east - b.west) * i / (GRID_SIZE - 1));
        }
        gridLats = lats;
        gridLngs = lngs;

        // Build flat arrays of all grid point coordinates
        const flatLats = [];
        const flatLngs = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                flatLats.push(lats[i].toFixed(4));
                flatLngs.push(lngs[j].toFixed(4));
            }
        }

        const latStr = flatLats.join(',');
        const lngStr = flatLngs.join(',');

        const url = 'https://api.open-meteo.com/v1/forecast?' +
            'latitude=' + latStr +
            '&longitude=' + lngStr +
            '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m' +
            '&forecast_days=' + FORECAST_DAYS +
            '&timezone=Europe%2FOslo&wind_speed_unit=ms';

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const json = await res.json();

            // json is an array of results, one per grid point
            const results = Array.isArray(json) ? json : [json];

            // Parse into windGrid structure
            const newGrid = {};

            // Get dates from first result
            const times = results[0].hourly.time;
            const newDates = [];
            for (let t = 0; t < times.length; t++) {
                const dt = times[t].substring(0, 10);
                if (!newDates.includes(dt)) newDates.push(dt);
            }

            // Initialize grid structure
            for (const dt of newDates) {
                newGrid[dt] = {};
                for (let h = 0; h < 24; h++) {
                    newGrid[dt][h] = {
                        dirs: Array.from({length: GRID_SIZE}, () => new Array(GRID_SIZE).fill(0)),
                        speeds: Array.from({length: GRID_SIZE}, () => new Array(GRID_SIZE).fill(0)),
                        gusts: Array.from({length: GRID_SIZE}, () => new Array(GRID_SIZE).fill(0))
                    };
                }
            }

            // Fill in data from each grid point
            for (let idx = 0; idx < results.length; idx++) {
                const i = Math.floor(idx / GRID_SIZE); // lat index
                const j = idx % GRID_SIZE;              // lng index
                const h = results[idx].hourly;

                for (let t = 0; t < h.time.length; t++) {
                    const dt = h.time[t].substring(0, 10);
                    const hour = parseInt(h.time[t].substring(11, 13));
                    if (newGrid[dt] && newGrid[dt][hour]) {
                        newGrid[dt][hour].dirs[i][j] = h.wind_direction_10m[t] || 0;
                        newGrid[dt][hour].speeds[i][j] = h.wind_speed_10m[t] || 0;
                        newGrid[dt][hour].gusts[i][j] = h.wind_gusts_10m[t] || 0;
                    }
                }
            }

            windGrid = newGrid;

            // Update dates if first load
            if (dates.length === 0) {
                dates = newDates.sort();
                selectedDate = dates.length > 1 ? dates[1] : dates[0];
                buildDateButtons();
            }

            updateDisplay();

            const pointCount = GRID_SIZE * GRID_SIZE;
            statusEl.textContent = 'Vindrutenett: ' + pointCount + ' punkter';
            statusEl.classList.remove('loading');

        } catch (e) {
            statusEl.textContent = 'Feil: ' + e.message;
            statusEl.classList.remove('loading');
        }

        isLoadingGrid = false;
    }

    // Clear canvas on map move
    map.on('movestart zoomstart', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => p.history = []);
    });

    // Refetch grid when map stops moving
    map.on('moveend zoomend', () => {
        clearTimeout(fetchDebounceTimer);
        fetchDebounceTimer = setTimeout(() => {
            fetchWindGrid();
            updateLocationSubtitle();
        }, 600);
    });

    function updateLocationSubtitle() {
        const center = map.getCenter();
        document.getElementById('locationSubtitle').textContent =
            center.lat.toFixed(3) + '\u00b0N, ' + center.lng.toFixed(3) + '\u00b0E';
    }

    // === INITIAL LOAD ===
    async function loadData() {
        const loading = document.getElementById('loading');
        const spinner = document.getElementById('spinner');
        const errorText = document.getElementById('errorText');
        const retryBtn = document.getElementById('retryBtn');
        const loadingText = document.getElementById('loadingText');

        loading.style.display = 'flex';
        spinner.style.display = 'block';
        errorText.style.display = 'none';
        retryBtn.style.display = 'none';
        loadingText.textContent = 'Henter vindrutenett (' + (GRID_SIZE*GRID_SIZE) + ' punkter)...';

        try {
            await fetchWindGrid();
            loading.style.display = 'none';
            updateLocationSubtitle();
            updateDisplay();
            initParticles();
            animate();
            autoCollapseOnMobile();
        } catch (e) {
            spinner.style.display = 'none';
            loadingText.textContent = 'Kunne ikke hente vinddata';
            errorText.style.display = 'block';
            errorText.textContent = e.message;
            retryBtn.style.display = 'inline-block';
        }
    }

    // === DATE BUTTONS ===
    function formatDateShort(dateStr) {
        const days = ['s\u00f8n','man','tir','ons','tor','fre','l\u00f8r'];
        const d = new Date(dateStr + 'T12:00:00');
        return days[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth()+1);
    }

    function buildDateButtons() {
        const row = document.getElementById('dateRow');
        row.innerHTML = '';
        dates.forEach(function(date) {
            const btn = document.createElement('button');
            btn.className = 'date-btn' + (date === selectedDate ? ' active' : '');
            btn.textContent = formatDateShort(date);
            btn.onclick = function() {
                selectedDate = date;
                document.querySelectorAll('.date-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                updateDisplay();
                particles.forEach(function(p) { p.history = []; p.age = 0; });
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };
            row.appendChild(btn);
        });
    }

    // === HELPERS ===
    function directionName(deg) {
        var dirs = ['N','NN\u00d8','N\u00d8','\u00d8N\u00d8','\u00d8','\u00d8S\u00d8','S\u00d8','SS\u00d8','S','SSV','SV','VSV','V','VNV','NV','NNV'];
        return dirs[Math.round(deg / 22.5) % 16];
    }

    function beaufortScale(ms) {
        if (ms < 0.3) return { level: 0, name: 'Stille' };
        if (ms < 1.6) return { level: 1, name: 'Flau vind' };
        if (ms < 3.4) return { level: 2, name: 'Svak vind' };
        if (ms < 5.5) return { level: 3, name: 'Lett bris' };
        if (ms < 8.0) return { level: 4, name: 'Laber bris' };
        if (ms < 10.8) return { level: 5, name: 'Frisk bris' };
        if (ms < 13.9) return { level: 6, name: 'Liten kuling' };
        if (ms < 17.2) return { level: 7, name: 'Stiv kuling' };
        if (ms < 20.8) return { level: 8, name: 'Sterk kuling' };
        if (ms < 24.5) return { level: 9, name: 'Liten storm' };
        if (ms < 28.5) return { level: 10, name: 'Full storm' };
        if (ms < 32.7) return { level: 11, name: 'Sterk storm' };
        return { level: 12, name: 'Orkan' };
    }

    // === DISPLAY (shows center-point wind) ===
    function updateDisplay() {
        const center = map.getCenter();
        const wind = getWindAtLatLng(center.lat, center.lng, selectedDate, currentHour);
        if (!wind) return;

        var dir = wind.dir, speed = wind.speed, gust = wind.gust;
        var bf = beaufortScale(speed);

        document.getElementById('timeDisplay').textContent = String(currentHour).padStart(2,'0') + ':00';
        document.getElementById('wDir').textContent = Math.round(dir) + '\u00b0';
        document.getElementById('wSpeed').textContent = speed.toFixed(1) + ' m/s';
        document.getElementById('wGust').textContent = gust.toFixed(1) + ' m/s';
        document.getElementById('wFrom').textContent = directionName(dir);

        var pct = Math.min(100, (bf.level / 12) * 100);
        var fill = document.getElementById('beaufortFill');
        fill.style.width = pct + '%';
        fill.style.background = windColorHex(speed);
        document.getElementById('beaufortLabel').textContent = 'Beaufort ' + bf.level + ' \u2014 ' + bf.name;
    }

    // === EVENTS ===
    document.getElementById('timeSlider').addEventListener('input', function(e) {
        currentHour = parseInt(e.target.value);
        updateDisplay();
        particles.forEach(function(p) { p.history = []; });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    document.getElementById('densitySlider').addEventListener('input', function(e) {
        particleCount = parseInt(e.target.value);
        document.getElementById('densityDisplay').textContent = particleCount;
    });

    document.getElementById('particleToggle').addEventListener('click', function() {
        animationEnabled = !animationEnabled;
        this.classList.toggle('on', animationEnabled);
        if (animationEnabled) {
            initParticles();
            animate();
        } else {
            if (animFrameId) cancelAnimationFrame(animFrameId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    });

    // === MOBILE TOGGLE ===
    var controlsPanel = document.querySelector('.controls');
    var controlsToggleBtn = document.getElementById('controlsToggle');
    var controlsVisible = true;

    controlsToggleBtn.addEventListener('click', function() {
        controlsVisible = !controlsVisible;
        controlsPanel.classList.toggle('collapsed', !controlsVisible);
    });

    function autoCollapseOnMobile() {
        if (window.innerWidth <= 600) {
            controlsVisible = false;
            controlsPanel.classList.add('collapsed');
        }
    }

    // === MOBILE PERFORMANCE ===
    var isMobileDevice = window.innerWidth <= 600;
    if (isMobileDevice) {
        particleCount = 300;
        document.getElementById('densitySlider').value = 300;
        document.getElementById('densityDisplay').textContent = '300';
    }

    // === START ===
    loadData();
    </script>
</body>
</html>
