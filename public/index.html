<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vindkart â Sogn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #e0e0e0;
        }
        #map { width: 100%; height: 100vh; }

        /* ââ Controls Panel ââ */
        .controls {
            position: absolute; top: 16px; right: 16px; z-index: 1000;
            background: rgba(26, 26, 46, 0.92); backdrop-filter: blur(12px);
            border-radius: 14px; padding: 20px 24px; width: 330px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
        }
        .controls h2 { font-size: 18px; margin-bottom: 2px; color: #7ec8e3; }
        .controls .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
        .control-group { margin-bottom: 16px; }
        .control-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        .control-group .value { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .control-group .unit { font-size: 13px; color: #7ec8e3; font-weight: 400; }

        /* ââ Date selector ââ */
        .date-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .date-btn {
            flex: 1; padding: 8px 6px; border: 1px solid rgba(126,200,227,0.3);
            background: transparent; color: #aaa; border-radius: 8px; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }
        .date-btn:hover { background: rgba(126,200,227,0.1); color: #fff; }
        .date-btn.active { background: rgba(126,200,227,0.2); color: #7ec8e3; border-color: #7ec8e3; }

        /* ââ Sliders ââ */
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
            background: #2a2a4a; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
            background: #7ec8e3; border: 2px solid #fff; cursor: pointer;
        }

        /* ââ Wind info box ââ */
        .wind-info {
            background: rgba(126, 200, 227, 0.1); border-radius: 10px; padding: 14px;
            border: 1px solid rgba(126, 200, 227, 0.2);
        }
        .wind-info .row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .wind-info .row:last-child { margin-bottom: 0; }
        .wind-info .label { color: #888; font-size: 13px; }
        .wind-info .val { color: #fff; font-size: 13px; font-weight: 600; }

        /* ââ Beaufort bar ââ */
        .beaufort-bar {
            margin-top: 12px; background: #2a2a4a; border-radius: 6px; height: 8px;
            overflow: hidden; position: relative;
        }
        .beaufort-fill {
            height: 100%; border-radius: 6px; transition: width 0.4s ease, background 0.4s ease;
        }
        .beaufort-label { font-size: 11px; color: #888; margin-top: 4px; }

        /* ââ Loading overlay ââ */
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2000; background: rgba(26,26,46,0.95);
            display: flex; align-items: center; justify-content: center;
        }
        .loading-box { text-align: center; color: #7ec8e3; }
        .loading-box .spinner {
            width: 36px; height: 36px; border: 3px solid #2a2a4a; border-top-color: #7ec8e3;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-box .error { color: #e74c3c; margin-top: 10px; font-size: 13px; }
        .loading-box .retry-btn {
            margin-top: 12px; padding: 8px 20px; border: 1px solid #7ec8e3; background: transparent;
            color: #7ec8e3; border-radius: 8px; cursor: pointer; font-size: 14px;
        }
        .loading-box .retry-btn:hover { background: rgba(126,200,227,0.15); }

        /* ââ Legend ââ */
        .legend {
            position: absolute; bottom: 20px; left: 16px; z-index: 1000;
            background: rgba(26, 26, 46, 0.9); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 12px 16px; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .api-badge {
            display: inline-block; font-size: 10px; color: #666; background: rgba(255,255,255,0.05);
            padding: 2px 8px; border-radius: 4px; margin-top: 10px;
        }

        /* ââ Responsive ââ */
        @media (max-width: 600px) {
            .controls { width: calc(100% - 32px); right: 16px; top: 10px; padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="loading-box">
            <div class="spinner" id="spinner"></div>
            <div id="loadingText">Henter vinddata fra Open-Meteo...</div>
            <div class="error" id="errorText" style="display:none;"></div>
            <button class="retry-btn" id="retryBtn" style="display:none;" onclick="loadData()">PrÃ¸v igjen</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <h2>Vindkart</h2>
        <div class="subtitle" id="locationSubtitle">61.032Â°N, 7.309Â°E â Sogn</div>

        <!-- Date buttons -->
        <div class="date-row" id="dateRow"></div>

        <div class="control-group">
            <label>Klokkeslett</label>
            <div class="value" id="timeDisplay">12:00</div>
            <input type="range" id="timeSlider" min="0" max="23" value="12" step="1">
        </div>

        <div class="control-group">
            <label>Avstand fra sentrum</label>
            <div class="value"><span id="distDisplay">1.0</span> <span class="unit">km</span></div>
            <input type="range" id="distSlider" min="0.3" max="5" value="1" step="0.1">
        </div>

        <div class="wind-info">
            <div class="row"><span class="label">Vindretning</span><span class="val" id="wDir">â</span></div>
            <div class="row"><span class="label">Vindhastighet</span><span class="val" id="wSpeed">â</span></div>
            <div class="row"><span class="label">Vindkast</span><span class="val" id="wGust">â</span></div>
            <div class="row"><span class="label">Vinden fra</span><span class="val" id="wFrom">â</span></div>
            <div class="beaufort-bar"><div class="beaufort-fill" id="beaufortFill"></div></div>
            <div class="beaufort-label" id="beaufortLabel"></div>
        </div>
        <div class="api-badge" id="apiBadge">Kilde: Open-Meteo</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div> Senterpunkt</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7ec8e3;"></div> Svak vind (&lt;5 m/s)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2ecc71;"></div> Lett bris (5â8 m/s)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12;"></div> Frisk bris (8â14 m/s)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div> Kuling+ (&gt;14 m/s)</div>
    </div>

    <script>
    // âââ CONFIG âââ
    const DEFAULT_LAT = 61.03219;
    const DEFAULT_LNG = 7.30878;
    const FORECAST_DAYS = 3;

    // âââ STATE âââ
    let allData = {};       // { "2026-03-28": [ {hour, dir, speed, gust}, ... ] }
    let dates = [];         // sorted list of date strings
    let selectedDate = '';
    let currentHour = 12;
    let currentDist = 1.0;
    let arrowMarkers = [];

    // âââ MAP SETUP âââ
    const map = L.map('map').setView([DEFAULT_LAT, DEFAULT_LNG], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap | Vind: Open-Meteo',
        maxZoom: 18
    }).addTo(map);

    const centerMarker = L.circleMarker([DEFAULT_LAT, DEFAULT_LNG], {
        radius: 8, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.9, weight: 2
    }).addTo(map).bindPopup('<b>Senterpunkt</b><br>61&deg;01\'55.9"N 7&deg;18\'31.6"E');

    // âââ API âââ
    async function fetchFromOpenMeteo() {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${DEFAULT_LAT}&longitude=${DEFAULT_LNG}` +
            `&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m` +
            `&forecast_days=${FORECAST_DAYS}&timezone=Europe%2FOslo&wind_speed_unit=ms`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (json.error) throw new Error(json.reason || 'API error');
        return json;
    }

    function parseApiData(json) {
        const h = json.hourly;
        const result = {};
        for (let i = 0; i < h.time.length; i++) {
            const dt = h.time[i].substring(0, 10); // "2026-03-28"
            const hour = parseInt(h.time[i].substring(11, 13));
            if (!result[dt]) result[dt] = [];
            result[dt].push({
                hour,
                dir: h.wind_direction_10m[i],
                speed: h.wind_speed_10m[i],
                gust: h.wind_gusts_10m[i] || 0
            });
        }
        return result;
    }

    async function loadData() {
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const errorText = document.getElementById('errorText');
        const retryBtn = document.getElementById('retryBtn');
        const spinner = document.getElementById('spinner');

        loading.style.display = 'flex';
        spinner.style.display = 'block';
        errorText.style.display = 'none';
        retryBtn.style.display = 'none';
        loadingText.textContent = 'Henter vinddata fra Open-Meteo...';

        try {
            const json = await fetchFromOpenMeteo();
            allData = parseApiData(json);
            dates = Object.keys(allData).sort();
            selectedDate = dates.length > 1 ? dates[1] : dates[0]; // default to tomorrow
            buildDateButtons();
            loading.style.display = 'none';
            updateDisplay();
        } catch (e) {
            spinner.style.display = 'none';
            loadingText.textContent = 'Kunne ikke hente vinddata';
            errorText.style.display = 'block';
            errorText.textContent = e.message;
            retryBtn.style.display = 'inline-block';
            console.error('Fetch error:', e);
        }
    }

    // âââ DATE BUTTONS âââ
    function formatDateShort(dateStr) {
        const days = ['sÃ¸n','man','tir','ons','tor','fre','lÃ¸r'];
        const d = new Date(dateStr + 'T12:00:00');
        const dayName = days[d.getDay()];
        const day = d.getDate();
        const month = d.getMonth() + 1;
        return `${dayName} ${day}/${month}`;
    }

    function buildDateButtons() {
        const row = document.getElementById('dateRow');
        row.innerHTML = '';
        dates.forEach(date => {
            const btn = document.createElement('button');
            btn.className = 'date-btn' + (date === selectedDate ? ' active' : '');
            btn.textContent = formatDateShort(date);
            btn.onclick = () => {
                selectedDate = date;
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateDisplay();
            };
            row.appendChild(btn);
        });
    }

    // âââ HELPERS âââ
    function degToRad(deg) { return deg * Math.PI / 180; }

    function directionName(deg) {
        const dirs = ['N','NNÃ','NÃ','ÃNÃ','Ã','ÃSÃ','SÃ','SSÃ','S','SSV','SV','VSV','V','VNV','NV','NNV'];
        return dirs[Math.round(deg / 22.5) % 16];
    }

    function offsetPoint(lat, lng, bearingDeg, distKm) {
        const R = 6371, brng = degToRad(bearingDeg);
        const lat1 = degToRad(lat), lng1 = degToRad(lng), d = distKm / R;
        const lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(brng));
        const lng2 = lng1 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(lat1), Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
        return [lat2*180/Math.PI, lng2*180/Math.PI];
    }

    function beaufortScale(ms) {
        if (ms < 0.3) return { level: 0, name: 'Stille' };
        if (ms < 1.6) return { level: 1, name: 'Flau vind' };
        if (ms < 3.4) return { level: 2, name: 'Svak vind' };
        if (ms < 5.5) return { level: 3, name: 'Lett bris' };
        if (ms < 8.0) return { level: 4, name: 'Laber bris' };
        if (ms < 10.8) return { level: 5, name: 'Frisk bris' };
        if (ms < 13.9) return { level: 6, name: 'Liten kuling' };
        if (ms < 17.2) return { level: 7, name: 'Stiv kuling' };
        if (ms < 20.8) return { level: 8, name: 'Sterk kuling' };
        if (ms < 24.5) return { level: 9, name: 'Liten storm' };
        if (ms < 28.5) return { level: 10, name: 'Full storm' };
        if (ms < 32.7) return { level: 11, name: 'Sterk storm' };
        return { level: 12, name: 'Orkan' };
    }

    function windColor(speed) {
        if (speed < 5) return '#7ec8e3';
        if (speed < 8) return '#2ecc71';
        if (speed < 14) return '#f39c12';
        if (speed < 20) return '#e74c3c';
        return '#c0392b';
    }

    function createArrowIcon(windDirDeg, speed) {
        const toDeg = (windDirDeg + 180) % 360;
        const color = windColor(speed);
        const size = Math.max(32, Math.min(55, 26 + speed * 1.2));
        const svg = `
            <svg width="${size}" height="${size}" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <g transform="rotate(${toDeg}, 20, 20)">
                    <line x1="20" y1="34" x2="20" y2="10" stroke="${color}" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
                    <polygon points="20,4 12,15 28,15" fill="${color}"/>
                    <line x1="14" y1="28" x2="20" y2="34" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
                    <line x1="26" y1="28" x2="20" y2="34" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
                </g>
            </svg>`;
        return L.divIcon({ html: svg, iconSize: [size, size], iconAnchor: [size/2, size/2], className: '' });
    }

    // âââ DISPLAY âââ
    function updateDisplay() {
        const dayData = allData[selectedDate];
        if (!dayData) return;
        const data = dayData.find(d => d.hour === currentHour) || dayData[0];
        const { dir, speed, gust } = data;
        const bf = beaufortScale(speed);

        // Update panel
        document.getElementById('timeDisplay').textContent = String(currentHour).padStart(2,'0') + ':00';
        document.getElementById('distDisplay').textContent = currentDist.toFixed(1);
        document.getElementById('wDir').textContent = `${Math.round(dir)}Â°`;
        document.getElementById('wSpeed').textContent = `${speed.toFixed(1)} m/s`;
        document.getElementById('wGust').textContent = `${gust.toFixed(1)} m/s`;
        document.getElementById('wFrom').textContent = directionName(dir);

        // Beaufort bar
        const pct = Math.min(100, (bf.level / 12) * 100);
        const fill = document.getElementById('beaufortFill');
        fill.style.width = pct + '%';
        fill.style.background = windColor(speed);
        document.getElementById('beaufortLabel').textContent = `Beaufort ${bf.level} â ${bf.name}`;

        // Clear arrows
        arrowMarkers.forEach(m => map.removeLayer(m));
        arrowMarkers = [];

        const popup = (extra = '') =>
            `<b>${formatDateShort(selectedDate)} kl ${String(currentHour).padStart(2,'0')}:00</b><br>` +
            `Vind: ${speed.toFixed(1)} m/s fra ${directionName(dir)} (${Math.round(dir)}Â°)<br>` +
            `Kast: ${gust.toFixed(1)} m/s<br>${bf.name} (Bf ${bf.level})${extra}`;

        // Outer ring
        for (let i = 0; i < 8; i++) {
            const bearing = (i * 360) / 8;
            const [lat, lng] = offsetPoint(DEFAULT_LAT, DEFAULT_LNG, bearing, currentDist);
            arrowMarkers.push(
                L.marker([lat, lng], { icon: createArrowIcon(dir, speed) })
                    .addTo(map).bindPopup(popup())
            );
        }

        // Center arrow
        arrowMarkers.push(
            L.marker([DEFAULT_LAT, DEFAULT_LNG], { icon: createArrowIcon(dir, speed), zIndexOffset: 1000 })
                .addTo(map).bindPopup(popup('<br><i>Senterpunkt</i>'))
        );

        // Inner ring
        if (currentDist > 0.6) {
            for (let i = 0; i < 4; i++) {
                const bearing = (i * 360) / 4 + 45;
                const [lat, lng] = offsetPoint(DEFAULT_LAT, DEFAULT_LNG, bearing, currentDist * 0.5);
                arrowMarkers.push(
                    L.marker([lat, lng], { icon: createArrowIcon(dir, speed) }).addTo(map)
                );
            }
        }
    }

    // âââ EVENTS âââ
    document.getElementById('timeSlider').addEventListener('input', e => {
        currentHour = parseInt(e.target.value);
        updateDisplay();
    });
    document.getElementById('distSlider').addEventListener('input', e => {
        currentDist = parseFloat(e.target.value);
        updateDisplay();
    });

    // âââ START âââ
    loadData();
    </script>
</body>
</html>
